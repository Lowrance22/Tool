<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF14 豐水之地 - 變異分析器 V4.1</title>
    <link rel="stylesheet" href="index.css">
    <!-- 引入外部邏輯檔案 -->
    <script src="Weather.js"></script>
    <script src="main.js"></script>
</head>
<body>

<div class="container main-layout">
    <!-- 左側/浮動 Debug 視窗 -->
    <div id="debugPanel" style="display:none;">
        <h4 style="color:var(--g-blue); margin-top:0;">🔍 Discord 解析偵錯</h4>
        <div id="debugContent">等待輸入中...</div>
    </div>

    <!-- 主要內容區 -->
    <div class="content-area">
        <h1>❄️ 豐水之地：變異分析器 V4.1</h1>
        
        <div class="controls">
            <!-- 序列設定 -->
            <div class="control-group">
                <label>連續輪數</label>
                <select id="targetRounds">
                    <option value="1">1 輪</option>
                    <option value="2">2 輪</option>
                    <option value="3" selected>3 輪</option>
                </select>
            </div>
            
            <!-- 變異條件設定 -->
            <div class="control-group">
                <label>完美組 (雙雪)</label>
                <select id="pCount">
                    <option value="0" selected>0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
            <div class="control-group">
                <label>變異組 (單雪)</label>
                <select id="hCount">
                    <option value="0" selected>0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
            <div class="control-group">
                <label>雙變組 (無雪)</label>
                <select id="nCount">
                    <option value="0" selected>0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
            
            <!-- 時間範圍設定 -->
            <div class="time-range">
                <div class="control-group">
                    <label>開始日期</label>
                    <input type="datetime-local" id="timeStart">
                </div>
                <div class="control-group">
                    <label>結束日期</label>
                    <input type="datetime-local" id="timeEnd">
                </div>
            </div>

<!-- 移除 dc-toggle-row 與 textarea -->
<div class="control-group" style="grid-column: 1 / -1;">
    <div class="filter-toggle-row" style="display:flex; justify-content:space-between; align-items:center; background:rgba(138,180,248,0.1); padding:12px; border-radius:12px;">
        <label style="color:var(--g-blue); font-size:14px; font-weight:bold;">👔 只顯示社畜友善時段 (平日晚間/週末)</label>
        <label class="switch">
            <input type="checkbox" id="workerMode">
            <span class="slider"></span>
        </label>
    </div>
</div>

            <button class="main-search" onclick="searchWeather()">⚡ 執行精確序列分析</button>
        </div>

        <!-- 結果過濾工具欄 -->
        <div id="filterBar" class="filter-bar" style="display:none; justify-content:center; gap:10px; margin-bottom:20px;">
            <button class="filter-btn active" onclick="setFilter('all', this)">全部顯示</button>
            <button class="filter-btn" style="color:var(--g-red)" onclick="setFilter('conflict', this)">交集紅色</button>
            <button class="filter-btn" style="color:var(--g-green)" onclick="setFilter('safe', this)">非交集綠色</button>
        </div>

        <!-- 分析結果顯示區域 -->
        <div id="results"></div>
    </div>
</div>

</body>
</html>
